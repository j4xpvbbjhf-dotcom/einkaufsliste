<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#1b1f3b">
  <title>Einkaufsliste</title>

  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Einkauf">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { margin: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1b1f3b;
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
      color: #1a1a18;
    }
    .add-input:focus { border-color: #1b1f3b !important; background: #fff !important; }
    .add-input::placeholder { color: #888882; }
    .login-input:focus { border-color: #4ade80 !important; }
    .login-input::placeholder { color: rgba(255,255,255,.4); }
    @keyframes popIn { 0% { transform: scale(.4); opacity: 0; } 60% { transform: scale(1.08); } 100% { transform: scale(1); opacity: 1; } }

    /* Pressed/hover-Effekte aus dem Design (style-active / style-hover) */
    [data-press]:active { opacity: .82; }
    [data-press-bg]:active { background: #f8f8f6; }
    [data-press-soft]:active { background: #f2f1ed; }
    .freq-chip:active { background: #f0fdf4; border-color: #4ade80; }
    .remove-x:hover { color: #e0573a; }

    /* Online/Offline-Hinweis für die geteilte Liste */
    #sync-banner {
      position: fixed; top: 0; left: 50%; transform: translateX(-50%);
      max-width: 430px; width: 100%; z-index: 50;
      font-size: 12px; font-weight: 600; text-align: center;
      padding: 5px 12px; display: none;
    }
    #sync-banner.show { display: block; }
    #sync-banner.offline { background: #fdecea; color: #b23a23; }
    #sync-banner.online  { background: #e7f8ee; color: #1d7a47; }
  </style>
</head>
<body>
  <div id="sync-banner"></div>
  <div id="root"></div>

  <!-- Konfiguration der geteilten Liste (leer = nur dieses Gerät, lokal gespeichert) -->
  <script src="config.js"></script>
  <!-- Optionaler Supabase-Client wird nur geladen, wenn config.js eine URL setzt -->
  <script src="store.js"></script>
  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
    }
  </script>
</body>
</html>
